<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>

  <title>404 — NexusFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

  <link rel="stylesheet" href="src/styles/main.css"/>
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .error-code {
      font-family: var(--font-mono);

    .error-page h1 { font-size: 36px; font-weight: 800; color: var(--white); margin-bottom: 16px; }
    .error-page p { font-size: 16px; color: var(--text-dim); margin-bottom: 40px; max-width: 360px; }

<nav class="nav scrolled">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-mark"></span>NexusFlow</a>
